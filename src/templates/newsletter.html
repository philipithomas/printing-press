<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site_title }}</title>
<style>
  body { margin: 0; padding: 0; background-color: {{ bg_color }}; font-family: 'Sohne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  @font-face { font-family: 'Sohne'; src: url('https://fonts.philipithomas.com/klim/soehne-buch.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Sohne'; src: url('https://fonts.philipithomas.com/klim/soehne-halbfett.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Tiempos Text'; src: url('https://fonts.philipithomas.com/klim/tiempos-text-regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
</style>
</head>
<body style="margin: 0; padding: 0; background-color: {{ bg_color }};">
<table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: {{ bg_color }};">
  <tr>
    <td align="center" style="padding: 40px 20px 0;">
      <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px;">
        <tr>
          <td style="padding: 0 0 20px; text-align: center;">
            {% if newsletter == "contraption" %}
            <a href="{{ site_url }}/contraption" style="text-decoration: none;">
              <img src="{{ site_url }}/images/contraption.svg" alt="Contraption" height="17" style="height: 17px; width: auto;">
            </a>
            {% elif newsletter == "workshop" %}
            <a href="{{ site_url }}/workshop" style="text-decoration: none;">
              <img src="{{ site_url }}/images/workshop-brand.svg" alt="Workshop" height="24" style="height: 24px; width: auto;">
            </a>
            {% elif newsletter == "postcard" %}
            <a href="{{ site_url }}/postcard" style="text-decoration: none;">
              <img src="{{ site_url }}/images/postcard.svg" alt="Postcard" height="18" style="height: 18px; width: auto;">
            </a>
            {% else %}
            <a href="{{ site_url }}" style="font-family: 'Sohne', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #111110; text-decoration: none;">philipithomas.com</a>
            {% endif %}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding: 0 20px;">
      <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 4px;">
        <tr>
          <td style="padding: 40px; font-family: 'Tiempos Text', Georgia, 'Times New Roman', serif; font-size: 17px; line-height: 1.6; color: #3B3834;">
            {{ content }}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding: 20px;">
      <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px;">
        <tr>
          <td style="text-align: center; padding: 16px 0;">
            <p style="margin: 0 0 8px; font-size: 11px; color: #9E9A93;">
              <a href="{{ unsubscribe_url }}" style="color: #9E9A93; text-decoration: underline;">Unsubscribe</a>
            </p>
            <p style="margin: 0; font-size: 11px; line-height: 1.5; color: #9E9A93;">
              &copy; {{ current_year }} The Contraption Company LLC<br>
              169 Madison Ave. Suite 2174, New York, NY 10016 USA
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
